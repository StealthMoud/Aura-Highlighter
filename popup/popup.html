<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aura Highlights</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="aura-popup">
    <!-- Header with statistics -->
    <header class="aura-header">
      <div class="aura-title-row">
        <h1>Aura Highlights</h1>
        <span id="highlight-count" class="accent-time">0</span>
      </div>
      <p class="aura-subtitle">Sleek context highlights</p>
    </header>

    <!-- Search input row -->
    <div class="search-container">
      <div class="search-wrapper">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search-input" class="premium-input" placeholder="Search highlights..." autocomplete="off">
      </div>
    </div>

    <!-- Active highlights list -->
    <main class="highlights-container">
      <div id="empty-state" class="empty-state">
        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/>
        </svg>
        <p>No highlights on this page.</p>
        <span class="empty-hint">Select any text to highlight it.</span>
      </div>
      <div id="highlights-list" class="highlights-list"></div>
    </main>

    <!-- Controls footer -->
    <footer class="aura-footer">
      <button id="clear-all-btn" class="danger-btn" title="Clear all page highlights">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
        <span>Clear Page</span>
      </button>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
